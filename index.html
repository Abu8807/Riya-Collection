<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abu Men's Fashion</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#333;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.hero{
    background:white;
    padding:50px;
    text-align:center;
}

.products{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:30px;
}

.card{
    width:250px;
    background:white;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    overflow:hidden;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.price{
    color:green;
    font-weight:bold;
    margin:10px 0;
}

button{
    background:#222;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>

</head>
<body>

<header>
    <h1>Abu Men's Fashion</h1>
    <p>Premium Men's Clothing Store</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shirts</a>
    <a href="#">T-Shirts</a>
    <a href="#">Jeans</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Welcome to Abu Men's Fashion</h2>
    <p>Discover the latest men's fashion trends.</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/250x250?text=T-Shirt" alt="T-Shirt">
        <div class="card-content">
            <h3>Casual T-Shirt</h3>
            <p class="price">₹599</p>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x250?text=Shirt" alt="Shirt">
        <div class="card-content">
            <h3>Formal Shirt</h3>
            <p class="price">₹999</p>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x250?text=Jeans" alt="Jeans">
        <div class="card-content">
            <h3>Blue Jeans</h3>
            <p class="price">₹1299</p>
            <button>Add to Cart</button>
        </div>
    </div>

</section>

<footer>
    <p>&copy; 2026 Abu Men's Fashion. All Rights Reserved.</p>
</footer>

</body>
</html>
